apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-rs
  labels:
    app: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: my-rs-temp
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx-cont
          image: mayurpandit25/studentapp-frontend:latest
          ports:
            - name: rs-port 
              containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: rs-svc
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
  - port: 80
    targetPort: 80
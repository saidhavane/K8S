apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: my-rs
  labels:
    ap: myapp
spec:
  replicas: 2
  template:
    metadata:
      name: my-rs-temp
      labels:
        app: myapp
      spec:
        containers:
          - name: nginx-cont
            image: mayurpandit25/studentapp-frontend:latest
            ports:
              - name: rs-port 
                containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: rs-svc
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    port: 80
    targetPort: 80